<!DOCTYPE html>
<html>
<head><style>
  body { margin: 0; background: #000; overflow: hidden; }
  img { width: 100%; height: 100vh; object-fit: contain; cursor: crosshair; }
  #coords { position: fixed; top: 8px; left: 8px; color: #fff; font: 12px monospace; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
</style></head>
<body>
  <img id="feed" src="{{url}}" alt="Video feed">
  <div id="coords"></div>
  <script>
    var img = document.getElementById('feed');
    img.addEventListener('click', function(e) {
      var rect = img.getBoundingClientRect();
      var x = Math.round((e.clientX - rect.left) / rect.width * (img.naturalWidth || rect.width));
      var y = Math.round((e.clientY - rect.top) / rect.height * (img.naturalHeight || rect.height));
      document.getElementById('coords').textContent = x + ', ' + y;
      // Post click event to parent
      if (window.parent !== window) {
        window.parent.postMessage({type: 'widget_click', widget: 'video', x: x, y: y}, '*');
      }
    });
    img.addEventListener('mousemove', function(e) {
      var rect = img.getBoundingClientRect();
      var x = Math.round((e.clientX - rect.left) / rect.width * (img.naturalWidth || rect.width));
      var y = Math.round((e.clientY - rect.top) / rect.height * (img.naturalHeight || rect.height));
      document.getElementById('coords').textContent = x + ', ' + y;
    });
  </script>
</body>
</html>
