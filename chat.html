<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Imp</title>
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<style>
:root { --bg:#0d1117; --fg:#c9d1d9; --muted:#8b949e; --border:#30363d;
  --user-bg:#1f6feb22; --agent-bg:#161b22; --input-bg:#0d1117;
  --accent:#58a6ff; --sidebar-w:260px; --status-h:28px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#app-body { flex:1; display:flex; overflow:hidden; }

/* --- sidebar --- */
#sidebar { width:var(--sidebar-w); background:#010409; border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; }
#sidebar-header { padding:12px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
#sidebar-header button { flex:1; padding:6px; background:var(--accent); color:#fff;
  border:none; border-radius:4px; cursor:pointer; font-size:13px; }
#sidebar-header button.del { background:#da3633; flex:0.4; }
#chat-list { flex:1; overflow-y:auto; padding:8px; }
#version { padding:8px 12px; font-size:10px; color:var(--muted); opacity:0.5;
  border-top:1px solid var(--border); text-align:center; }
.chat-item { padding:8px 10px; border-radius:6px; cursor:pointer; font-size:13px;
  margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  color:var(--muted); }
.chat-item:hover { background:var(--border); }
.chat-item.active { background:var(--user-bg); color:var(--accent); }
.chat-item .chat-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item .chat-date { font-size:10px; opacity:0.5; margin-top:2px; }

/* --- main area --- */
#main { flex:1; display:flex; flex-direction:column; min-width:0; }

/* --- messages --- */
#messages { flex:1; overflow-y:auto; padding:16px 24px; }
.msg { margin-bottom:16px; max-width:80%; }
.msg.user { margin-left:auto; background:var(--user-bg); border-radius:12px 12px 0 12px; padding:10px 14px; }
.msg.agent { background:var(--agent-bg); border:1px solid var(--border);
  border-radius:12px 12px 12px 0; padding:10px 14px; }
.msg .role { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; }
.msg .body { line-height:1.5; font-size:14px; }
.msg .body p { margin:0.4em 0; }
.msg .body pre { background:#161b22; padding:10px; border-radius:6px; overflow-x:auto; margin:8px 0; }
.msg .body code { font-size:13px; font-family:"SF Mono",Consolas,monospace; }
.msg .body img { max-width:100%; border-radius:6px; margin:8px 0; }
.msg .body a { color:var(--accent); }
.msg .body table { border-collapse:collapse; width:100%; margin:8px 0; }
.msg .body th,.msg .body td { border:1px solid var(--border); padding:4px 8px; font-size:13px; text-align:left; }
.msg .body th { background:#161b22; }
.msg .body blockquote { border-left:3px solid var(--border); padding-left:12px; color:var(--muted); margin:8px 0; }
.msg .body .tool-block { margin:8px 0; border:1px solid var(--border); border-radius:6px;
  background:#161b22; font-size:13px; }
.msg .body .tool-block summary { padding:6px 10px; cursor:pointer; color:var(--muted);
  font-family:"SF Mono",Consolas,monospace; font-size:12px; list-style:none; }
.msg .body .tool-block summary::-webkit-details-marker { display:none; }
.msg .body .tool-block summary::before { content:"▶ "; font-size:10px; }
.msg .body .tool-block[open] summary::before { content:"▼ "; }
.msg .body .tool-block pre { margin:0; padding:8px 10px; border-top:1px solid var(--border);
  font-size:11px; max-height:300px; overflow:auto; white-space:pre-wrap; color:var(--fg); }
.msg .body .tool-block.ok { border-color:#238636; }
.msg .body .tool-block.error { border-color:#da3633; }
.msg .body .tool-block.running { border-color:var(--accent); }
.msg .body .tool-block.running summary { color:var(--accent); }
.msg .body .thinking-block { margin:8px 0; border:1px solid var(--border); border-radius:6px;
  background:#161b22; font-size:13px; border-left:3px solid #8b949e; }
.msg .body .thinking-block summary { padding:6px 10px; cursor:pointer; color:var(--muted);
  font-size:12px; font-style:italic; list-style:none; }
.msg .body .thinking-block summary::-webkit-details-marker { display:none; }
.msg .body .thinking-block summary::before { content:"▶ "; font-size:10px; }
.msg .body .thinking-block[open] summary::before { content:"▼ "; }
.msg .body .thinking-block .thinking-content { padding:8px 12px; border-top:1px solid var(--border);
  font-size:12px; color:var(--muted); line-height:1.5; white-space:pre-wrap; }

/* --- input area --- */
#input-area { border-top:1px solid var(--border); padding:12px 24px; background:#010409; }
#input-row { display:flex; gap:8px; }
#input { flex:1; background:var(--input-bg); color:var(--fg); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px; font-size:14px; font-family:inherit;
  resize:none; min-height:20px; max-height:120px; outline:none; }
#input:focus { border-color:var(--accent); }
#send-btn, #stop-btn { padding:10px 16px; border:none; border-radius:8px; cursor:pointer;
  font-size:14px; font-weight:600; }
#send-btn { background:var(--accent); color:#fff; }
#send-btn:disabled { opacity:0.4; cursor:not-allowed; }
#stop-btn { background:#da3633; color:#fff; display:none; }

/* --- status bar --- */
#status { height:var(--status-h); padding:4px 24px; font-size:12px; color:var(--muted);
  background:#010409; border-top:1px solid var(--border); display:flex; align-items:center; }
#status.active { color:var(--accent); }
#status .dot { width:6px; height:6px; border-radius:50%; background:var(--accent);
  margin-right:8px; animation:pulse 1s infinite; }
#status .stop-inline { margin-left:auto; background:#da3633; color:#fff; border:none;
  border-radius:4px; padding:2px 10px; cursor:pointer; font-size:11px; font-weight:600; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* --- tabs --- */
#tab-bar { display:flex; align-items:center; border-bottom:1px solid var(--border);
  background:#010409; flex-shrink:0; }
.tab { padding:10px 20px; background:none; border:none; color:var(--muted); cursor:pointer;
  font-size:13px; font-weight:600; border-bottom:2px solid transparent; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover { color:var(--fg); }
.tab-content { flex:1; display:flex; flex-direction:column; min-height:0; }
#chat-tab { flex:1; display:flex; flex-direction:column; }

/* --- queue --- */
#queue-tab { flex:1; overflow-y:auto; padding:16px 24px; }
.queue-group { margin-bottom:16px; }
.queue-group-header { font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase;
  letter-spacing:0.04em; padding:4px 0; border-bottom:1px solid var(--border); margin-bottom:8px;
  cursor:pointer; }
.queue-group-header .count { font-weight:normal; opacity:0.6; }
.queue-item { padding:8px 12px; border:1px solid var(--border); border-radius:6px; margin-bottom:6px;
  cursor:pointer; font-size:13px; background:var(--agent-bg); transition:border-color 0.15s; }
.queue-item:hover { border-color:var(--accent); }
.queue-item .qi-title { color:var(--fg); }
.queue-item .qi-time { font-size:11px; color:var(--muted); margin-top:2px; }
.queue-empty { color:var(--muted); font-size:13px; font-style:italic; padding:40px 0; text-align:center; }

/* --- popup --- */
#queue-popup { position:fixed; top:0; left:0; right:0; bottom:0; z-index:100; display:flex;
  align-items:center; justify-content:center; }
#queue-popup-backdrop { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); }
#queue-popup-content { position:relative; background:var(--bg); border:1px solid var(--border);
  border-radius:12px; max-width:700px; width:90%; max-height:80vh; overflow-y:auto;
  padding:20px 24px; }
#queue-popup-title { font-size:16px; font-weight:600; margin-bottom:12px; }
#queue-popup-body { font-size:14px; line-height:1.6; margin-bottom:16px; }
#queue-popup-body img { max-width:100%; border-radius:6px; }
#queue-popup-actions { display:flex; gap:8px; justify-content:flex-end; }
#queue-popup-actions button { padding:8px 16px; border:none; border-radius:6px; cursor:pointer;
  font-size:13px; font-weight:600; }
#queue-popup-actions .action-primary { background:var(--accent); color:#fff; }
#queue-popup-actions .action-secondary { background:var(--border); color:var(--fg); }
#queue-popup-actions .action-close { background:#da3633; color:#fff; }

/* --- workflows --- */
#workflows-tab { flex:1; overflow-y:auto; padding:16px 24px; }
.wf-item { border:1px solid var(--border); border-radius:8px;
  margin-bottom:10px; background:var(--agent-bg); }
.wf-item > summary { padding:12px 16px; cursor:pointer; list-style:none;
  display:flex; align-items:center; gap:12px; }
.wf-item > summary::-webkit-details-marker { display:none; }
.wf-item > summary::before { content:"▶ "; font-size:10px; color:var(--muted); }
.wf-item[open] > summary::before { content:"▼ "; }
.wf-item-name { font-size:14px; font-weight:600; flex:1; }
.wf-item-meta { font-size:12px; color:var(--muted); }
.wf-item-status { font-size:12px; font-weight:600; }
.wf-item-status.idle { color:var(--muted); }
.wf-item-status.running { color:var(--accent); }
.wf-item-status.paused { color:#f0883e; }
.wf-item-status.done { color:#3fb950; }
.wf-item-status.error { color:#da3633; }
.wf-start { padding:4px 12px; background:var(--accent); color:#fff; border:none;
  border-radius:4px; cursor:pointer; font-size:12px; font-weight:600; }
.wf-start:disabled { opacity:0.4; cursor:not-allowed; }
.wf-body { padding:0 16px 12px; }
.wf-steps { font-size:12px; }
.wf-step-item { border:1px solid var(--border); border-radius:6px;
  margin-bottom:6px; background:#0d1117; }
.wf-step-item > summary { padding:6px 10px; cursor:pointer; list-style:none;
  font-size:12px; color:var(--muted); }
.wf-step-item > summary::-webkit-details-marker { display:none; }
.wf-step-item > summary::before { content:"▶ "; font-size:9px; }
.wf-step-item[open] > summary::before { content:"▼ "; }
.wf-step-item.done > summary { color:#3fb950; }
.wf-step-item.running > summary { color:var(--accent); }
.wf-step-item.paused > summary { color:#f0883e; }
.wf-step-code { margin:0; padding:8px 10px; border-top:1px solid var(--border);
  font-size:11px; line-height:1.5; overflow-x:auto; white-space:pre;
  font-family:"SF Mono",Consolas,monospace; color:var(--fg); counter-reset:line; }
.wf-step-code .line { display:block; }
.wf-step-code .line::before { counter-increment:line; content:counter(line);
  display:inline-block; width:2.5em; text-align:right; margin-right:1em;
  color:var(--muted); opacity:0.4; font-size:10px; }
.wf-step-output { padding:6px 10px; border-top:1px solid var(--border); font-size:11px; }
.wf-step-output strong { color:var(--muted); font-size:10px; text-transform:uppercase; }
.wf-step-output pre { margin:4px 0 0; white-space:pre-wrap; color:var(--fg); max-height:300px; overflow:auto; }
.wf-step-output table { width:100%; border-collapse:collapse; font-size:11px; margin:4px 0 0; }
.wf-step-output th, .wf-step-output td { border:1px solid var(--border); padding:3px 8px; text-align:left; }
.wf-step-output th { background:#161b22; font-weight:600; }
.wf-step-output td:first-child { white-space:nowrap; }
.wf-step-code .kw { color:#ff7b72; }
.wf-step-code .str { color:#a5d6ff; }
.wf-step-code .fn { color:#d2a8ff; }
.wf-step-code .cm { color:#8b949e; font-style:italic; }

/* --- responsive --- */
@media(max-width:700px) {
  #sidebar { display:none; }
}
</style>
</head>
<body>

<div id="tab-bar">
  <button class="tab active" onclick="switchTab('queue')">Queue</button>
  <button class="tab" onclick="switchTab('chat')">Chat</button>
  <button class="tab" onclick="switchTab('workflows')">Workflows</button>
  <div id="version" style="margin-left:auto;"></div>
  <script>
    fetch(location.origin + '/api/version').then(r => r.json()).then(d => {
      document.getElementById('version').textContent = d.version ? 'Imp · ' + d.version : 'Imp';
    }).catch(() => {
      document.getElementById('version').textContent = 'Imp';
    });
  </script>
</div>

<div id="app-body">

<div id="sidebar" style="display:none">
  <div id="sidebar-header">
    <button onclick="newChat()">+ New</button>
    <button class="del" onclick="deleteChat()">Del</button>
  </div>
  <div id="chat-list"></div>
</div>

<div id="main">
  <!-- Queue tab (default) -->
  <div id="queue-tab" class="tab-content">
    <div id="queue-list"></div>
  </div>

  <!-- Workflows tab -->
  <div id="workflows-tab" class="tab-content" style="display:none;">
    <div id="workflows-list"></div>
  </div>

  <!-- Chat tab -->
  <div id="chat-tab" class="tab-content" style="display:none;">
  <div id="messages"></div>
  <div id="input-area">
    <div id="input-row">
      <textarea id="input" rows="1" placeholder="Ask Foreman..." onkeydown="onKey(event)"></textarea>
      <button id="send-btn" onclick="send()">Send</button>
      <button id="stop-btn" onclick="stop()">Stop</button>
    </div>
  </div>
  <div id="status"></div>
  </div><!-- /chat-tab -->

  <!-- Queue item popup -->
  <div id="queue-popup" style="display:none;">
    <div id="queue-popup-backdrop" onclick="closePopup()"></div>
    <div id="queue-popup-content">
      <div id="queue-popup-title"></div>
      <div id="queue-popup-body"></div>
      <div id="queue-popup-actions"></div>
    </div>
  </div>
</div><!-- /main -->
</div><!-- /app-body -->

<script>
const API = location.origin;
const WS_URL = `ws://${location.host}/ws/chat`;
let ws = null;
let currentChatId = null;
let isWorking = false;

// --- markdown ---
marked.setOptions({ breaks: true, gfm: true });

function renderMd(text) {
  // Preserve <details> blocks from being escaped by marked
  const toolBlocks = [];
  text = text.replace(/<details class="(?:tool-block|thinking-block)[^"]*">[\s\S]*?<\/details>/g, (match) => {
    toolBlocks.push(match);
    return `%%TOOL_BLOCK_${toolBlocks.length - 1}%%`;
  });

  // Replace mermaid code blocks with render server images
  text = text.replace(/```mermaid\n([\s\S]*?)```/g, (_, diagram) => {
    const encoded = encodeURIComponent(diagram.trim());
    const imgUrl = `${API}/render/mermaid?diagram=${encoded}`;
    const viewUrl = `${API}/render/mermaid?diagram=${encoded}&mode=viewer`;
    return `<a href="${viewUrl}" target="_blank"><img src="${imgUrl}" alt="mermaid diagram"></a>`;
  });
  let html = marked.parse(text);
  // Restore tool blocks after markdown parsing
  toolBlocks.forEach((block, i) => {
    html = html.replace(`%%TOOL_BLOCK_${i}%%`, block);
  });
  // Make all images clickable — render-server images → viewer, others → open image
  html = html.replace(/<img src="([^"]*)"([^>]*)>/g, (match, src, rest) => {
    // Skip if already wrapped in <a>
    if (html.indexOf(`<a `) !== -1 && html.indexOf(match) > html.lastIndexOf(`<a `, html.indexOf(match))) {
      return match;
    }
    let linkUrl = src;
    if (src.includes('/render/')) {
      linkUrl = src.includes('mode=') ? src : src + (src.includes('?') ? '&' : '?') + 'mode=viewer';
    } else if (src.includes('/public/charts/')) {
      linkUrl = src;  // direct link to the HTML file
    }
    return `<a href="${linkUrl}" target="_blank" title="Open in new tab"><img src="${src}"${rest}></a>`;
  });
  return html;
}

// --- messages ---
function addMessage(role, content) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.innerHTML = `<div class="role">${role}</div><div class="body">${renderMd(content)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

// --- status ---
function setStatus(text) {
  const el = document.getElementById('status');
  if (text) {
    el.innerHTML = `<span class="dot"></span>${text}<button class="stop-inline" onclick="stop()">Stop</button>`;
    el.className = 'active';
  } else {
    el.innerHTML = '';
    el.className = '';
  }
}

function setWorking(v) {
  isWorking = v;
  document.getElementById('send-btn').style.display = v ? 'none' : '';
  document.getElementById('stop-btn').style.display = v ? '' : 'none';
  document.getElementById('input').disabled = v;
}

// --- websocket ---
let currentAgentMsg = null;
let agentText = '';
let pendingTools = {};  // name → {args} for open tool_start blocks

function ensureAgentMsg() {
  if (!currentAgentMsg) {
    currentAgentMsg = addMessage('agent', '');
    agentText = '';
  }
  return currentAgentMsg;
}

function renderAgentBody() {
  if (!currentAgentMsg) return;
  currentAgentMsg.querySelector('.body').innerHTML = renderMd(agentText);
  scrollBottom();
}

function formatArgs(args) {
  if (!args || Object.keys(args).length === 0) return '';
  return Object.entries(args).map(([k,v]) =>
    typeof v === 'string' ? `${k}="${v}"` : `${k}=${JSON.stringify(v)}`
  ).join(', ');
}

function connectWs() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => console.log('ws connected');
  ws.onclose = () => { ws = null; setTimeout(connectWs, 2000); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'token':
        ensureAgentMsg();
        agentText += msg.text;
        renderAgentBody();
        break;

      case 'tool_start': {
        ensureAgentMsg();
        // Use a counter so each placeholder is unique even for the same tool
        const toolSeq = (pendingTools._seq = (pendingTools._seq || 0) + 1);
        const tag = `tool-${toolSeq}`;
        // Queue per tool name (FIFO)
        if (!pendingTools[msg.name]) pendingTools[msg.name] = [];
        pendingTools[msg.name].push({args: msg.args || {}, tag});
        agentText += `\n\n<details class="tool-block running ${tag}"><summary>⏳ ${msg.name}(${formatArgs(msg.args)})...</summary><pre>Running...</pre></details>\n\n`;
        renderAgentBody();
        break;
      }

      case 'tool_done': {
        ensureAgentMsg();
        const icon = msg.status === 'ok' ? '✅' : '❌';
        const dur = msg.duration ? ` · ${msg.duration.toFixed(1)}s` : '';
        // Pop the first pending entry for this tool name (FIFO)
        const queue = pendingTools[msg.name] || [];
        const entry = queue.shift();
        if (!queue.length) delete pendingTools[msg.name];
        const args = entry ? entry.args : {};
        const tag = entry ? entry.tag : '';
        const formattedOutput = msg.output ? formatStepOutput(msg.output) : '<pre>(no output)</pre>';
        if (tag) {
          const oldBlock = `<details class="tool-block running ${tag}"><summary>⏳ ${msg.name}(${formatArgs(args)})...</summary><pre>Running...</pre></details>`;
          const newBlock = `<details class="tool-block ${msg.status} ${tag}"><summary>${icon} ${msg.name}(${formatArgs(args)})${dur}</summary><div class="wf-step-output">${formattedOutput}</div></details>`;
          agentText = agentText.replace(oldBlock, newBlock);
        }
        renderAgentBody();
        break;
      }

      case 'thinking': {
        ensureAgentMsg();
        const escaped = msg.text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        // Accumulate thinking into one block or add new one
        const thinkingHtml = `<details class="thinking-block"><summary>Thinking</summary><div class="thinking-content">${escaped}</div></details>`;
        agentText += `\n\n${thinkingHtml}\n\n`;
        renderAgentBody();
        break;
      }

      case 'status':
        setStatus(msg.text);
        break;

      case 'done':
        if (currentAgentMsg && msg.full_text) {
          // Keep tool blocks that were injected, append final text if needed
          if (!agentText.includes(msg.full_text) && msg.full_text) {
            agentText += msg.full_text;
          }
          renderAgentBody();
        }
        currentAgentMsg = null;
        agentText = '';
        pendingTools = {};
        setWorking(false);
        setStatus('');
        scrollBottom();
        break;

      case 'error':
        addMessage('agent', `**Error:** ${msg.text}`);
        setWorking(false);
        setStatus('');
        break;

      case 'image':
        ensureAgentMsg();
        agentText += `\n\n![${msg.alt || 'chart'}](${msg.url})\n`;
        renderAgentBody();
        break;
    }
  };
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || isWorking) return;
  addMessage('user', text);
  ws.send(JSON.stringify({ type: 'message', text, chat_id: currentChatId }));
  input.value = '';
  input.style.height = 'auto';
  setWorking(true);
  setStatus('Thinking...');
}

function stop() {
  if (ws) ws.send(JSON.stringify({ type: 'stop' }));
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  // auto-resize
  const el = e.target;
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// --- chat sidebar ---
async function loadChats() {
  try {
    const res = await fetch(`${API}/api/chats`);
    const chats = await res.json();
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    chats.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = `chat-item${c.id === currentChatId ? ' active' : ''}`;
      const dateStr = c.created_at ? new Date(c.created_at).toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
      el.innerHTML = `<div class="chat-title">${c.title || 'New chat'}</div><div class="chat-date">${dateStr}</div>`;
      el.onclick = () => loadChat(c.id, i === 0);
      list.appendChild(el);
    });
  } catch (e) { console.error('loadChats failed:', e); }
}

function renderTurnFull(turn) {
  // Build the full content including thinking + tool blocks
  let parts = [];

  // Thinking blocks
  if (turn.thinking && turn.thinking.length) {
    turn.thinking.forEach(t => {
      const escaped = t.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      parts.push(`<details class="thinking-block"><summary>Thinking</summary><div class="thinking-content">${escaped}</div></details>`);
    });
  }

  // Tool calls
  if (turn.tool_calls && turn.tool_calls.length) {
    turn.tool_calls.forEach(tc => {
      const icon = tc.status === 'ok' ? '✅' : (tc.status === 'error' ? '❌' : '⏳');
      const dur = tc.duration_s ? ` · ${tc.duration_s.toFixed(1)}s` : '';
      const args = tc.args || {};
      const output = (tc.output || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      parts.push(`<details class="tool-block ${tc.status || ''}"><summary>${icon} ${tc.name}(${formatArgs(args)})${dur}</summary><pre>${output || '(no output)'}</pre></details>`);
    });
  }

  // Content
  if (turn.content) {
    parts.push(turn.content);
  }

  return parts.join('\n\n');
}

let isHistoricView = false;

function setHistoricMode(on) {
  isHistoricView = on;
  document.getElementById('input-area').style.display = on ? 'none' : '';
  document.getElementById('status').style.display = on ? 'none' : '';
}

async function loadChat(id, isActive) {
  try {
    const res = await fetch(`${API}/api/chats/${id}`);
    const chat = await res.json();
    currentChatId = id;
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';

    // Show date header
    const dateStr = chat.created_at ? new Date(chat.created_at).toLocaleString() : '';
    const title = chat.title || 'Chat';
    msgs.innerHTML = `<div style="text-align:center;padding:16px 0 8px;"><strong>${title}</strong><br><span style="font-size:11px;color:var(--muted);">${dateStr}</span></div>`;

    // Render all turns with full log
    (chat.turns || []).forEach(t => {
      const role = t.role === 'user' ? 'user' : 'agent';
      const content = role === 'agent' ? renderTurnFull(t) : t.content;
      addMessage(role, content);
    });

    // Topmost chat (active) is editable, others are read-only logs
    setHistoricMode(!isActive);
    loadChats();
  } catch (e) { console.error('loadChat failed:', e); }
}

async function newChat() {
  try {
    const res = await fetch(`${API}/api/chats`, { method: 'POST' });
    const chat = await res.json();
    currentChatId = chat.id;
    document.getElementById('messages').innerHTML = '';
    setHistoricMode(false);  // new chat is editable
    loadChats();
  } catch (e) { console.error('newChat failed:', e); }
}

async function deleteChat() {
  if (!currentChatId) return;
  if (!confirm('Delete this chat?')) return;
  try {
    await fetch(`${API}/api/chats/${currentChatId}`, { method: 'DELETE' });
    currentChatId = null;
    document.getElementById('messages').innerHTML = '';
    loadChats();
  } catch (e) { console.error('deleteChat failed:', e); }
}

// --- tabs ---
let activeTab = 'queue';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('queue-tab').style.display = tab === 'queue' ? '' : 'none';
  document.getElementById('chat-tab').style.display = tab === 'chat' ? '' : 'none';
  document.getElementById('workflows-tab').style.display = tab === 'workflows' ? '' : 'none';
  document.getElementById('sidebar').style.display = tab === 'chat' ? '' : 'none';
  if (tab === 'queue') loadQueue();
  if (tab === 'workflows') loadWorkflows();
}

// --- queue ---
let queueItems = [];
let queuePollInterval = null;

async function loadQueue() {
  try {
    const res = await fetch(`${API}/api/queue`);
    queueItems = await res.json();
    renderQueue();
  } catch (e) { console.error('loadQueue failed:', e); }
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  if (!queueItems.length) {
    el.innerHTML = '<div class="queue-empty">No pending items</div>';
    return;
  }
  // Group by tool
  const groups = {};
  queueItems.forEach(item => {
    const g = item.tool || 'general';
    if (!groups[g]) groups[g] = [];
    groups[g].push(item);
  });
  let html = '';
  for (const [tool, items] of Object.entries(groups)) {
    html += `<div class="queue-group">`;
    html += `<div class="queue-group-header">${tool} <span class="count">(${items.length})</span></div>`;
    items.forEach(item => {
      const time = item.created_at ? new Date(item.created_at).toLocaleString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
      html += `<div class="queue-item" onclick="openPopup('${item.id}')">
        <div class="qi-title">${item.title}</div>
        <div class="qi-time">${time}</div>
      </div>`;
    });
    html += '</div>';
  }
  el.innerHTML = html;
}

function openPopup(itemId) {
  const item = queueItems.find(i => i.id === itemId);
  if (!item) return;
  document.getElementById('queue-popup-title').textContent = item.title;
  document.getElementById('queue-popup-body').innerHTML = item.detail_html || '<em>No details</em>';
  const actionsEl = document.getElementById('queue-popup-actions');
  actionsEl.innerHTML = '';
  (item.actions || []).forEach((a, i) => {
    const btn = document.createElement('button');
    btn.textContent = a.label;
    btn.className = i === 0 ? 'action-primary' : 'action-secondary';
    btn.onclick = () => resolveItem(item.id, a.action);
    actionsEl.appendChild(btn);
  });
  // Always add a close button that doesn't change anything
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.className = 'action-close';
  closeBtn.onclick = closePopup;
  actionsEl.appendChild(closeBtn);
  document.getElementById('queue-popup').style.display = '';
}

function closePopup() {
  document.getElementById('queue-popup').style.display = 'none';
}

async function resolveItem(itemId, action) {
  try {
    await fetch(`${API}/api/queue/${itemId}/action`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action}),
    });
    closePopup();
    loadQueue();
  } catch (e) { console.error('resolveItem failed:', e); }
}

// --- workflows ---
function highlightPython(src) {
  // Escape HTML first, then highlight with placeholders to avoid interference
  return src.split('\n').map(line => {
    let h = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Replace tokens with numbered placeholders, collect spans
    const spans = [];
    function ph(s) { spans.push(s); return `\x00${spans.length-1}\x00`; }
    // Comments first (so # inside strings isn't caught — good enough for display)
    h = h.replace(/(#.*)$/, (_, c) => ph(`<span class="cm">${c}</span>`));
    // Triple-quoted strings
    h = h.replace(/((&quot;){3}.*?(&quot;){3}|'{3}.*?'{3})/g, (m) => ph(`<span class="str">${m}</span>`));
    // Regular strings
    h = h.replace(/(&quot;[^&]*?&quot;|"[^"]*?"|'[^']*?')/g, (m) => ph(`<span class="str">${m}</span>`));
    // Keywords
    h = h.replace(/\b(def|return|import|from|if|else|elif|for|in|while|try|except|with|as|class|and|or|not|True|False|None|async|await)\b/g,
      (m) => ph(`<span class="kw">${m}</span>`));
    // Restore placeholders
    h = h.replace(/\x00(\d+)\x00/g, (_, i) => spans[parseInt(i)]);
    return `<span class="line">${h}</span>`;
  }).join('');
}

function formatStepOutput(text) {
  // Render output as markdown via marked.js
  const trimmed = text.trim();
  if (!trimmed) return '<pre>(no output)</pre>';

  // Try JSON — pretty-print and render as ```json
  try {
    const obj = JSON.parse(trimmed);
    let pretty = JSON.stringify(obj, null, 2);
    // Truncate huge output
    if (pretty.length > 5000) pretty = pretty.substring(0, 5000) + '\n... (truncated)';
    return marked.parse('```json\n' + pretty + '\n```');
  } catch (e) {}

  // Tab-separated → markdown table
  const lines = trimmed.split('\n');
  if (lines.length > 1 && lines.every(l => l.includes('\t'))) {
    const rows = lines.map(l => l.split('\t'));
    let md = '| ' + rows[0].map(c => c.trim()).join(' | ') + ' |\n';
    md += '| ' + rows[0].map(() => '---').join(' | ') + ' |\n';
    rows.slice(1).forEach(cols => { md += '| ' + cols.map(c => c.trim()).join(' | ') + ' |\n'; });
    return marked.parse(md);
  }

  // Plain text
  return marked.parse('```\n' + trimmed + '\n```');
}

function _getOpenDetails(container) {
  // Save which <details> are open before re-render
  const open = new Set();
  container.querySelectorAll('details[open]').forEach(d => {
    const id = d.dataset.id || d.querySelector('summary')?.textContent?.trim();
    if (id) open.add(id);
  });
  return open;
}

function _restoreOpenDetails(container, open) {
  container.querySelectorAll('details').forEach(d => {
    const id = d.dataset.id || d.querySelector('summary')?.textContent?.trim();
    if (id && open.has(id)) d.open = true;
  });
}

async function loadWorkflows() {
  try {
    const res = await fetch(`${API}/api/workflows`);
    const workflows = await res.json();
    const el = document.getElementById('workflows-list');
    if (!workflows.length) {
      el.innerHTML = '<div class="queue-empty">No workflows found.<br>Add step scripts to workflows/&lt;name&gt;/</div>';
      return;
    }

    // Save open state before re-render
    const openState = _getOpenDetails(el);

    let html = '';
    for (const wf of workflows) {
      const statusClass = wf.status || 'idle';
      const statusIcons = {idle:'⚪', running:'🔄', paused:'⏸', done:'✅', error:'❌'};
      const icon = statusIcons[wf.status] || '⚪';
      const canStart = wf.status === 'idle' || wf.status === 'done' || wf.status === 'error';

      let stepsHtml = '';
      try {
        const sres = await fetch(`${API}/api/workflows/${wf.name}`);
        const sdata = await sres.json();
        const steps = sdata.steps || [];
        stepsHtml = steps.map(s => {
          const sIcon = {done:'✅', running:'🔄', paused:'⏸', pending:'⏳', error:'❌'}[s.status] || '⏳';
          const dur = s.result?.duration_s ? ` · ${s.result.duration_s}s` : '';
          const code = s.source ? `<pre class="wf-step-code">${highlightPython(s.source)}</pre>` : '';
          // Show output from last run if available
          let outputHtml = '';
          if (s.result) {
            const ok = s.result.ok ? '✅' : '❌';
            const dur = s.result.duration_s ? ` · ${s.result.duration_s}s` : '';
            const content = s.result.output || s.result.error || '';
            const tb = s.result.traceback || '';
            let bodyHtml = '';
            if (content) bodyHtml += formatStepOutput(content);
            if (tb) bodyHtml += '<details><summary style="font-size:11px;color:var(--muted);cursor:pointer;">Traceback</summary>' + formatStepOutput(tb) + '</details>';
            outputHtml = `<div class="wf-step-output"><strong>${ok} ${s.result.ok !== false ? 'OK' : 'Error'}${dur}</strong>${bodyHtml}</div>`;
          }
          return `<details class="wf-step-item ${s.status}" data-id="step-${wf.name}-${s.name}">
            <summary>${sIcon} ${s.description || s.name}${dur}</summary>
            ${outputHtml}
            ${code}
          </details>`;
        }).join('');
      } catch (e) {}

      const ranAt = wf.ran_at ? `Last run: ${new Date(wf.ran_at).toLocaleString()}` : '';
      html += `<details class="wf-item" data-id="wf-${wf.name}" ${wf.status !== 'idle' ? 'open' : ''}>
        <summary>
          <span class="wf-item-name">${wf.name}</span>
          <span class="wf-item-meta">${wf.step_count} steps</span>
          <span class="wf-item-status ${statusClass}">${icon} ${wf.status}</span>
          <button class="wf-start" ${canStart ? '' : 'disabled'} onclick="event.stopPropagation();startWorkflow('${wf.name}')">Start</button>
        </summary>
        <div class="wf-body">
          <div class="wf-item-meta" style="margin-bottom:8px;">${wf.description}${ranAt ? ' · <em>'+ranAt+'</em>' : ''}</div>
          <div class="wf-steps">${stepsHtml}</div>
        </div>
      </details>`;
    }
    el.innerHTML = html;

    // Restore open state after re-render
    _restoreOpenDetails(el, openState);
  } catch (e) { console.error('loadWorkflows failed:', e); }
}

async function startWorkflow(name) {
  try {
    await fetch(`${API}/api/workflows/${name}/start`, {method:'POST'});
    loadWorkflows();
    const poll = setInterval(async () => {
      if (activeTab !== 'workflows') { clearInterval(poll); return; }
      await loadWorkflows();
      try {
        const res = await fetch(`${API}/api/workflows/${name}`);
        const data = await res.json();
        if (data.status === 'done' || data.status === 'error' || data.status === 'idle') clearInterval(poll);
      } catch(e) { clearInterval(poll); }
    }, 2000);
  } catch (e) { console.error('startWorkflow failed:', e); }
}

queuePollInterval = setInterval(() => { if (activeTab === 'queue') loadQueue(); }, 5000);
